name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Fetch all history for commitlint

      - name: 🏗️ Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Lint commit messages (PR)
        if: github.event_name == 'pull_request'
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: 🔍 Lint commit messages (Push)
        if: github.event_name == 'push'
        run: bun run lint:commits

      - name: 📚 Generate API documentation
        run: bun run docs:generate

      - name: 🔍 Check if docs are up-to-date
        run: |
          if [[ -n $(git status --porcelain docs/api) ]]; then
            echo "❌ API documentation is out of date. Please run 'bun run docs:generate' and commit the changes."
            git diff docs/api
            exit 1
          fi

      - name: 🧹 Lint
        run: bun run lint

      - name: 🧾 Type check
        run: bun run type-check

      - name: 🔍 Check for unused code
        run: bun run lint:knip

      - name: 🏗️ Build (includes publint via rslib plugin)
        run: bun run build

      - name: 🔍 Type check
        run: bun run lint:types

      - name: 🧪 Run unit tests
        run: bun run test:unit

      - name: 🎭 Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: 🧪 Run E2E tests
        run: bun run test:e2e

      - name: 📦 Verify package contents
        run: npm pack --dry-run
