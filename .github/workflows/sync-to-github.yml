name: Sync to GitHub.com

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  sync:
    if: github.server_url != 'https://github.com'
    runs-on: dk-ubcommon2604
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Push to github.com
        env:
          GH_COM_PAT: ${{ secrets.GH_COM_PAT }}
        run: |
          git -c credential.helper='!f() { echo "password=$GH_COM_PAT"; }; f' \
            push https://x-access-token@github.com/EntrustCorporation/idaas-auth-js.git ${{ github.ref }}
