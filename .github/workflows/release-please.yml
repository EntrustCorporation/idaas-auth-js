name: Release Please

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  release-please:
    # Runs on GHE only — creates the release PR and tag there; sync-to-github.yml
    # mirrors the tag to github.com which triggers the publish job below.
    if: github.server_url != 'https://github.com' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    # Triggered by a v* tag push on github.com (mirrored from GHE by sync-to-github.yml).
    if: github.server_url == 'https://github.com' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🏗️ Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧹 Lint
        run: bun run lint

      - name: 🧾 Type check
        run: bun run type-check

      - name: 🏗️ Build
        run: bun run build

      - name: 🔍 Check for unused code
        run: bun run lint:knip

      - name: 🔍 Type check
        run: bun run lint:types

      - name: 🎭 Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: 🧪 Run unit tests
        run: bun test

      - name: 🧪 Run E2E tests
        run: bun run test:e2e

      - name: 📦 Verify package contents
        run: npm pack --dry-run

      - name: 📦 Publish to npm (Trusted Publishing)
        run: npm publish --provenance --access public
