name: Release Please

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  release-please:
    # Runs on GHE only — creates the release PR, tag, and GHE release. A tag
    # created via GITHUB_TOKEN does NOT trigger sync-to-github.yml's tag
    # trigger (GitHub blocks GITHUB_TOKEN-created events from starting new
    # workflow runs), so we mirror the tag + release to github.com directly
    # below instead of relying on that chain.
    if: github.server_url != 'https://github.com' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout release tag
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Mirror tag + release to github.com
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_COM_PAT: ${{ secrets.GH_COM_PAT }}
          GH_TOKEN: ${{ secrets.GH_COM_PAT }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
          GHE_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          git -c credential.helper='!f() { echo "password=$GH_COM_PAT"; }; f' \
            push https://x-access-token@github.com/EntrustCorporation/idaas-auth-js.git "refs/tags/$TAG_NAME"

          # release-please's changelog links point at the GHE repo (where it runs).
          # Rewrite commit/compare links to github.com — those SHAs/tags are
          # identical across the mirror. Leave issues/PR links pointing at GHE:
          # issue/PR numbers are per-repo and don't correspond between hosts, so
          # rewriting them would silently point at the wrong github.com PR/issue.
          NOTES="${RELEASE_BODY//"$GHE_REPO_URL/commit/"/https://github.com/EntrustCorporation/idaas-auth-js/commit/}"
          NOTES="${NOTES//"$GHE_REPO_URL/compare/"/https://github.com/EntrustCorporation/idaas-auth-js/compare/}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          printf '%s' "$NOTES" > "$NOTES_FILE"

          # Idempotent: a release for this tag may already exist (e.g. prior
          # manual remediation, or a re-run after a partial failure).
          if gh release view "$TAG_NAME" --repo EntrustCorporation/idaas-auth-js >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --repo EntrustCorporation/idaas-auth-js \
              --title "$TAG_NAME" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG_NAME" --repo EntrustCorporation/idaas-auth-js \
              --title "$TAG_NAME" --notes-file "$NOTES_FILE"
          fi

  publish:
    # Triggered by the v* tag push mirrored directly by the job above.
    if: github.server_url == 'https://github.com' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🏗️ Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Generate API client
        run: bun run api:generate

      - name: 🧹 Lint
        run: bun run lint

      - name: 🧾 Type check
        run: bun run type-check

      - name: 🏗️ Build
        run: bun run build

      - name: 🔍 Check for unused code
        run: bun run lint:knip

      - name: 🔍 Type check
        run: bun run lint:types

      - name: 🎭 Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: 🧪 Run unit tests
        run: bun test

      - name: 🧪 Run E2E tests
        run: bun run test:e2e

      - name: 📦 Verify package contents
        run: npm pack --dry-run

      - name: 📦 Publish to npm (Trusted Publishing)
        run: npm publish --provenance --access public
